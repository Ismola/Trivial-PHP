version: '3.8'

services:
  php:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: trivial
    networks:
      - trivial-network

  nginx:
    build:
      context: .
      dockerfile: nginx.Dockerfile
    container_name: trivial-php
    ports:
      - "8080:80"
    depends_on:
      - php
    networks:
      - trivial-network

networks:
  default:
    name: cloudflare_default
    driver: bridge
  trivial-network:
    driver: bridge
