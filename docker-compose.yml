version: '3.8'

services:
  web:
    image: php:8.2
    ports:
      - "8080:80"
    volumes:
      - .:/var/www/html
    working_dir: /var/www/html
    container_name: trivial-php
    restart: unless-stopped
    command: >
      bash -c "
      mkdir -p /var/www/html/Ficheros &&
      touch /var/www/html/Ficheros/datos /var/www/html/Ficheros/jugadores &&
      chmod 777 /var/www/html/Ficheros &&
      chmod 666 /var/www/html/Ficheros/datos /var/www/html/Ficheros/jugadores &&
      php -S 0.0.0.0:80 -t /var/www/html
      "
    networks:
      - cloudflare_default

networks:
  cloudflare_default:
    external: true

