version: '3.8'

services:
  php:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: trivial
    volumes:
      - .:/var/www/html
    networks:
      - trivial-network

  nginx:
    image: nginx:alpine
    container_name: trivial-php
    ports:
      - "8080:80"
    volumes:
      - .:/var/www/html
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - php
    networks:
      - trivial-network

networks:
  default:
    name: cloudflare_default
    driver: bridge
  trivial-network:
    driver: bridge
